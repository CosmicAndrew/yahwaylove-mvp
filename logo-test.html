<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { background: #1a1a2e; display: flex; gap: 40px; padding: 40px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>

<!-- FULL LOGO — matches original: circular badge, YAH|WAY stacked, cross motif -->
<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="YAHWAYLOVE">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="97" fill="#b89a7a" stroke="#7a5c3c" stroke-width="6"/>
  <!-- Inner fill -->
  <circle cx="100" cy="100" r="91" fill="#c8ae94"/>

  <!-- YAH — large, left-dominant, bold rounded letters -->
  <!-- Y -->
  <rect x="22" y="18" width="11" height="45" rx="5.5" fill="#6b4226"/>
  <rect x="22" y="18" width="11" height="45" rx="5.5" fill="#5a3419" opacity="0.3" transform="translate(2,2)"/>
  <rect x="46" y="18" width="11" height="45" rx="5.5" fill="#6b4226"/>
  <line x1="27" y1="63" x2="51" y2="63" stroke="#6b4226" stroke-width="11" stroke-linecap="round"/>
  <rect x="32" y="58" width="11" height="35" rx="5.5" fill="#6b4226"/>

  <!-- A -->
  <rect x="64" y="18" width="11" height="80" rx="5.5" fill="#6b4226"/>
  <rect x="88" y="18" width="11" height="80" rx="5.5" fill="#6b4226"/>
  <rect x="64" y="52" width="35" height="11" rx="5.5" fill="#6b4226"/>
  <!-- A peak -->
  <path d="M69 22 L89 22" stroke="#6b4226" stroke-width="2"/>

  <!-- H -->
  <rect x="108" y="18" width="11" height="80" rx="5.5" fill="#6b4226"/>
  <rect x="132" y="18" width="11" height="80" rx="5.5" fill="#6b4226"/>
  <rect x="108" y="52" width="35" height="11" rx="5.5" fill="#6b4226"/>

  <!-- WAY — right side, descending -->
  <!-- W -->
  <rect x="152" y="22" width="9" height="45" rx="4.5" fill="#6b4226"/>
  <rect x="168" y="22" width="9" height="45" rx="4.5" fill="#6b4226"/>
  <rect x="184" y="22" width="9" height="45" rx="4.5" fill="#6b4226"/>
  <path d="M156 67 L162 80 L172 50 L182 80 L188 67" stroke="#6b4226" stroke-width="9" stroke-linejoin="round" stroke-linecap="round" fill="none"/>

  <!-- A (WAY) -->
  <rect x="155" y="85" width="9" height="50" rx="4.5" fill="#6b4226"/>
  <rect x="185" y="85" width="9" height="50" rx="4.5" fill="#6b4226"/>
  <rect x="155" y="108" width="39" height="9" rx="4.5" fill="#6b4226"/>
  <path d="M159 89 L186 89" stroke="#6b4226" stroke-width="9" stroke-linecap="round"/>

  <!-- Y (WAY) -->
  <rect x="158" y="148" width="9" height="38" rx="4.5" fill="#6b4226"/>
  <rect x="182" y="148" width="9" height="38" rx="4.5" fill="#6b4226"/>
  <rect x="163" y="166" width="9" height="30" rx="4.5" fill="#6b4226"/>
  <path d="M162 152 L171 170 L182 152" stroke="#6b4226" stroke-width="9" stroke-linejoin="round" stroke-linecap="round" fill="none"/>

  <!-- Cross motif — small, in the WAY section -->
  <!-- vertical beam -->
  <rect x="139" y="80" width="8" height="55" rx="4" fill="#e8d5bc"/>
  <!-- horizontal beam -->
  <rect x="122" y="100" width="42" height="8" rx="4" fill="#e8d5bc"/>
  <!-- JESUS text on horizontal -->
  <text x="143" y="107" font-family="serif" font-size="5.5" fill="#7a5c3c" text-anchor="middle" font-weight="bold">JESUS</text>
  <!-- ANDREW on vertical top -->
  <text x="143" y="95" font-family="serif" font-size="4" fill="#7a5c3c" text-anchor="middle">ANDREW</text>
  <!-- HAILEY on vertical bottom -->
  <text x="143" y="128" font-family="serif" font-size="4" fill="#7a5c3c" text-anchor="middle">HAILEY</text>
</svg>

<!-- NAVBAR SIZE -->
<svg width="40" height="40" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="YAHWAYLOVE">
  <circle cx="100" cy="100" r="97" fill="#b89a7a" stroke="#7a5c3c" stroke-width="6"/>
  <circle cx="100" cy="100" r="91" fill="#c8ae94"/>
  <rect x="22" y="18" width="11" height="45" rx="5.5" fill="#6b4226"/>
  <rect x="46" y="18" width="11" height="45" rx="5.5" fill="#6b4226"/>
  <rect x="32" y="58" width="11" height="35" rx="5.5" fill="#6b4226"/>
  <rect x="64" y="18" width="11" height="80" rx="5.5" fill="#6b4226"/>
  <rect x="88" y="18" width="11" height="80" rx="5.5" fill="#6b4226"/>
  <rect x="64" y="52" width="35" height="11" rx="5.5" fill="#6b4226"/>
  <rect x="108" y="18" width="11" height="80" rx="5.5" fill="#6b4226"/>
  <rect x="132" y="18" width="11" height="80" rx="5.5" fill="#6b4226"/>
  <rect x="108" y="52" width="35" height="11" rx="5.5" fill="#6b4226"/>
</svg>

<div style="color:white;font-family:sans-serif;max-width:500px;">
  <h3>Logo Analysis</h3>
  <p>Original: Circular badge · Warm tan/brown (#c8ae94 bg, #6b4226 letterforms, #7a5c3c ring) · "YAHWAY" bold rounded pill letters · Cross motif with ANDREW/JESUS/HAILEY · Family seal aesthetic</p>
</div>

</body>
</html>
