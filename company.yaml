# Revenue model
offer_ladder:
  tier_0:
    name: Free Sample Close
    price: $0
    description: SCOUT identifies → CONTENT writes 1 post → HERALD sends "post it if you like it"
    agents: [SCOUT, CONTENT, HERALD]
  tier_1:
    name: Faith Content Sprint
    price: $500
    description: 10 posts in your voice in 48 hours — theology reviewed, distribution ready
    url: /sprint
    agents: [CONTENT, EDITOR]
    distribution: blotato
  tier_2:
    name: Monthly Retainer
    tiers:
      - { name: Kingdom Starter, price: $2500, agents: 4 }
      - { name: Kingdom Builder, price: $4500, agents: 9 }
      - { name: Kingdom Dominator, price: $8500, agents: 10 }
  tier_3:
    name: AI Training Camp
    tiers:
      - { name: Self-Study, price: $97 }
      - { name: Group Workshop, price: $297 }
      - { name: "1-on-1 Session", price: $497 }
      - { name: Team Training, price: $2500 }

# Budget governance (Sprint phase)
budget:
