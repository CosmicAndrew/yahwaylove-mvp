<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="YAHWAYLOVE">
  <defs>
    <clipPath id="bc">
      <circle cx="100" cy="100" r="89"/>
    </clipPath>
  </defs>

  <!-- Badge -->
  <circle cx="100" cy="100" r="97" fill="#7a5533"/>
  <circle cx="100" cy="100" r="91" fill="#c4a882"/>

  <g clip-path="url(#bc)">

    <!-- ══ YAH — left column (x: 14–130) ══ -->

    <!-- Y -->
    <line x1="16" y1="22" x2="31" y2="55" stroke="#5c3318" stroke-width="12" stroke-linecap="round"/>
    <line x1="46" y1="22" x2="31" y2="55" stroke="#5c3318" stroke-width="12" stroke-linecap="round"/>
    <line x1="31" y1="55" x2="31" y2="108" stroke="#5c3318" stroke-width="12" stroke-linecap="round"/>

    <!-- A -->
    <line x1="53" y1="108" x2="67" y2="22" stroke="#5c3318" stroke-width="12" stroke-linecap="round"/>
    <line x1="90" y1="108" x2="76" y2="22" stroke="#5c3318" stroke-width="12" stroke-linecap="round"/>
    <line x1="58" y1="72" x2="85" y2="72" stroke="#5c3318" stroke-width="10" stroke-linecap="round"/>

    <!-- H -->
    <line x1="99" y1="22" x2="99" y2="108" stroke="#5c3318" stroke-width="12" stroke-linecap="round"/>
    <line x1="130" y1="22" x2="130" y2="108" stroke="#5c3318" stroke-width="12" stroke-linecap="round"/>
    <line x1="99" y1="65" x2="130" y2="65" stroke="#5c3318" stroke-width="10" stroke-linecap="round"/>

    <!-- ══ WAY — right column (x: 138–172)
         Circle at y=35: max x = 100+sqrt(89²-65²) = 100+sqrt(7921-4225) = 100+60.8 = 160.8
         Circle at y=50: max x = 100+sqrt(89²-50²) = 100+sqrt(7921-2500) = 100+73.6 = 173.6
         So W can start at y=38, safe x up to ~158
    ══ -->

    <!-- W (y: 36–66, x: 136–162) -->
    <line x1="136" y1="36" x2="141" y2="62" stroke="#5c3318" stroke-width="9" stroke-linecap="round"/>
    <line x1="141" y1="62" x2="148" y2="40" stroke="#5c3318" stroke-width="9" stroke-linecap="round"/>
    <line x1="148" y1="40" x2="155" y2="62" stroke="#5c3318" stroke-width="9" stroke-linecap="round"/>
    <line x1="155" y1="62" x2="160" y2="36" stroke="#5c3318" stroke-width="9" stroke-linecap="round"/>

    <!-- A (y: 68–110, x: 135–162) -->
    <line x1="135" y1="110" x2="144" y2="68" stroke="#5c3318" stroke-width="9" stroke-linecap="round"/>
    <line x1="162" y1="110" x2="153" y2="68" stroke="#5c3318" stroke-width="9" stroke-linecap="round"/>
    <line x1="138" y1="96" x2="159" y2="96" stroke="#5c3318" stroke-width="8" stroke-linecap="round"/>

    <!-- Y (y: 114–178, x: 135–162) -->
    <line x1="135" y1="114" x2="148" y2="145" stroke="#5c3318" stroke-width="9" stroke-linecap="round"/>
    <line x1="162" y1="114" x2="148" y2="145" stroke="#5c3318" stroke-width="9" stroke-linecap="round"/>
    <line x1="148" y1="145" x2="148" y2="183" stroke="#5c3318" stroke-width="9" stroke-linecap="round"/>

    <!-- ══ CROSS (cream) ══ -->
    <line x1="134" y1="120" x2="134" y2="185" stroke="#e8d4bc" stroke-width="7" stroke-linecap="round"/>
    <line x1="118" y1="150" x2="152" y2="150" stroke="#e8d4bc" stroke-width="7" stroke-linecap="round"/>

    <!-- JESUS -->
    <text x="134" y="153.5" font-family="Georgia,serif" font-size="6" fill="#6b4220" text-anchor="middle" font-weight="bold" letter-spacing="0.6">JESUS</text>

    <!-- ANDREW -->
    <g transform="rotate(-90 134 133)">
      <text x="134" y="136" font-family="Georgia,serif" font-size="5" fill="#6b4220" text-anchor="middle" letter-spacing="0.3">ANDREW</text>
    </g>

    <!-- HAILEY -->
    <g transform="rotate(-90 134 168)">
      <text x="134" y="171" font-family="Georgia,serif" font-size="5" fill="#6b4220" text-anchor="middle" letter-spacing="0.3">HAILEY</text>
    </g>

  </g>
</svg>
